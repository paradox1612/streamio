{{- if .Values.scheduler.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "streambridge.fullname" . }}-scheduler
  labels:
    {{- include "streambridge.labels" . | nindent 4 }}
    app.kubernetes.io/component: scheduler
spec:
  replicas: {{ .Values.scheduler.replicaCount }}
  selector:
    matchLabels:
      {{- include "streambridge.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: scheduler
  template:
    metadata:
      annotations:
        checksum/backend-secret: {{ include (print $.Template.BasePath "/backend-secret.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "streambridge.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: scheduler
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.postgres.enabled }}
      initContainers:
        - name: wait-for-postgres
          image: "{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}"
          imagePullPolicy: {{ .Values.postgres.image.pullPolicy }}
          envFrom:
            - secretRef:
                name: {{ include "streambridge.postgresAuthSecretName" . }}
          command:
            - sh
            - -c
            - >
              until pg_isready -h {{ include "streambridge.postgresName" . }} -p 5432 -U "$POSTGRES_USER" -d "$POSTGRES_DB";
              do echo "waiting for postgres"; sleep 2; done
      {{- end }}
      containers:
        - name: scheduler
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          command:
            - node
            - src/scheduler.js
          env:
            - name: APP_ROLE
              value: "scheduler"
            - name: NODE_ENV
              value: {{ .Values.backend.env.nodeEnv | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.backend.env.logLevel | quote }}
            - name: RESOLVER_DEBUG
              value: {{ .Values.backend.env.resolverDebug | quote }}
            - name: FRONTEND_URL
              value: {{ .Values.backend.env.frontendUrl | quote }}
            - name: BASE_URL
              value: {{ .Values.backend.env.baseUrl | quote }}
            - name: HEALTH_CHECK_ENABLED
              value: {{ .Values.backend.env.healthCheckEnabled | quote }}
            - name: HEALTH_CHECK_STARTUP_ENABLED
              value: {{ .Values.backend.env.healthCheckStartupEnabled | quote }}
            - name: HEALTH_CHECK_BATCH_SIZE
              value: {{ .Values.backend.env.healthCheckBatchSize | quote }}
            - name: HEALTH_CHECK_PROVIDER_MIN_INTERVAL_MS
              value: {{ .Values.backend.env.healthCheckProviderMinIntervalMs | quote }}
            - name: ACCOUNT_LOOKUP_SUCCESS_TTL_SECONDS
              value: {{ .Values.backend.env.accountLookupSuccessTtlSeconds | quote }}
            - name: ACCOUNT_LOOKUP_FAILURE_TTL_SECONDS
              value: {{ .Values.backend.env.accountLookupFailureTtlSeconds | quote }}
            - name: TMDB_MATCH_BATCH_SIZE
              value: {{ .Values.backend.env.tmdbMatchBatchSize | quote }}
            - name: TMDB_MATCH_CONCURRENCY
              value: {{ .Values.backend.env.tmdbMatchConcurrency | quote }}
            - name: TMDB_MATCH_BATCH_PAUSE_MS
              value: {{ .Values.backend.env.tmdbMatchBatchPauseMs | quote }}
            - name: VPN_ENABLED
              value: {{ .Values.vpn.enabled | quote }}
            {{- if .Values.vpn.enabled }}
            - name: GLOBAL_AGENT_HTTP_PROXY
              value: "http://localhost:8888"
            - name: GLOBAL_AGENT_HTTPS_PROXY
              value: "http://localhost:8888"
            - name: GLOBAL_AGENT_NO_PROXY
              value: "localhost,127.0.0.1,postgres"
            - name: GLUETUN_CONTROL_URL
              value: "http://localhost:8000"
            - name: VPN_ROTATION_HOURS
              value: {{ .Values.vpn.rotationHours | quote }}
            {{- end }}
          envFrom:
            - secretRef:
                name: {{ include "streambridge.backendName" . }}-env
          resources:
            {{- toYaml .Values.scheduler.resources | nindent 12 }}
        {{- if .Values.vpn.enabled }}
        - name: gluetun
          image: "{{ .Values.vpn.image.repository }}:{{ .Values.vpn.image.tag }}"
          imagePullPolicy: {{ .Values.vpn.image.pullPolicy }}
          securityContext:
            capabilities:
              add: [NET_ADMIN]
          env:
            - name: VPN_SERVICE_PROVIDER
              value: "private internet access"
            - name: VPN_TYPE
              value: "openvpn"
            - name: OPENVPN_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "streambridge.backendName" . }}-env
                  key: PIA_USERNAME
            - name: OPENVPN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "streambridge.backendName" . }}-env
                  key: PIA_PASSWORD
            - name: SERVER_REGIONS
              value: {{ .Values.vpn.serverRegions | quote }}
            - name: HTTPPROXY
              value: "on"
            - name: HTTPPROXY_LOG
              value: "off"
            - name: HTTPPROXY_LISTENING_ADDRESS
              value: ":8888"
            - name: HTTP_CONTROL_SERVER_ADDRESS
              value: ":8000"
            - name: HTTP_CONTROL_SERVER_LOG
              value: "off"
            - name: UPDATER_PERIOD
              value: "24h"
            - name: FIREWALL_OUTBOUND_SUBNETS
              value: {{ .Values.vpn.firewallOutboundSubnets | quote }}
          volumeMounts:
            - name: tun-device
              mountPath: /dev/net/tun
          resources:
            {{- toYaml .Values.vpn.resources | nindent 12 }}
        {{- end }}
      {{- if .Values.vpn.enabled }}
      volumes:
        - name: tun-device
          hostPath:
            path: /dev/net/tun
      {{- end }}
      {{- with .Values.scheduler.nodeSelector | default .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.scheduler.affinity | default .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.scheduler.tolerations | default .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
