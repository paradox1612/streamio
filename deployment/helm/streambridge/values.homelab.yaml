imagePullSecrets: []

frontend:
  replicaCount: 1
  image:
    repository: ghcr.io/paradox1612/streambridge-frontend
    tag: latest
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 80

backend:
  replicaCount: 1
  image:
    repository: ghcr.io/paradox1612/streambridge-backend
    tag: latest
    pullPolicy: Always
  service:
    type: ClusterIP
    port: 3001
  env:
    nodeEnv: production
    logLevel: info
    resolverDebug: "false"
    frontendUrl: "https://streambridge.thekush.dev"
    baseUrl: "https://streambridge.thekush.dev"
    healthCheckEnabled: "true"
    healthCheckStartupEnabled: "false"
    healthCheckBatchSize: "2"
    healthCheckProviderMinIntervalMs: "3600000"
    twoCaptchaPollIntervalMs: "5000"
    twoCaptchaPollAttempts: "48"
    accountLookupSuccessTtlSeconds: "600"
    accountLookupFailureTtlSeconds: "300"
    tmdbMatchBatchSize: "1000"
    tmdbMatchConcurrency: "2"
    tmdbMatchBatchPauseMs: "250"
  secrets:
    databaseUrl: ""
    tmdbApiKey: "set-me"
    adminUsername: admin
    adminPassword: "set-me-strong-password"
    jwtSecret: "set-me-long-random-secret"
    piaUsername: ""
    piaPassword: ""
    twoCaptchaApiKey: "set-me"

scheduler:
  enabled: true
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  nodeSelector: {}
  tolerations: []
  affinity: {}

postgres:
  enabled: true
  auth:
    existingSecret: ""
    database: streambridge
    username: postgres
    password: "set-me-db-password"
    secretKeys:
      database: POSTGRES_DB
      username: POSTGRES_USER
      password: POSTGRES_PASSWORD
  persistence:
    enabled: true
    size: 20Gi
    storageClassName: local-path
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi
  nodeSelector: {}
  tolerations: []
  affinity: {}

ingress:
  enabled: true
  className: nginx
  annotations: {}
  host: streambridge.thekush.dev
  tls:
    enabled: false
    secretName: ""

twenty:
  ingress:
    enabled: true
    host: twenty.thekush.dev
    tls: false
    secretName: ""
  env:
    SERVER_URL: "https://twenty.thekush.dev"
    REDIS_URL: "redis://{{ .Release.Name }}-redis-master:6379"

redis:
  image:
    registry: docker.io
    repository: redis
    tag: "7.2-bookworm"

vpn:
  enabled: true
  serverRegions: "US East"
  rotationHours: "1"
  # Keep Kubernetes service discovery working inside the pod while routing
  # provider HTTP/HTTPS traffic through gluetun's local proxy.
  dnsKeepNameserver: "on"
  firewallOutboundSubnets: "10.42.0.0/16,10.43.0.0/16"
