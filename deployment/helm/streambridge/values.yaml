nameOverride: ""
fullnameOverride: ""

imagePullSecrets: []

frontend:
  replicaCount: 1
  image:
    repository: ghcr.io/paradox1612/streambridge-frontend
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 3000
  resources: {}

backend:
  replicaCount: 1
  image:
    repository: ghcr.io/paradox1612/streambridge-backend
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 3001
  env:
    nodeEnv: production
    logLevel: info
    resolverDebug: "false"
    frontendUrl: "https://stream.example.com"
    baseUrl: "https://stream.example.com"
    healthCheckEnabled: "true"
    healthCheckStartupEnabled: "false"
    healthCheckBatchSize: "2"
    healthCheckProviderMinIntervalMs: "3600000"
    accountLookupSuccessTtlSeconds: "600"
    accountLookupFailureTtlSeconds: "300"
    tmdbMatchBatchSize: "1000"
    tmdbMatchConcurrency: "2"
    tmdbMatchBatchPauseMs: "250"
  secrets:
    databaseUrl: ""
    tmdbApiKey: ""
    adminUsername: admin
    adminPassword: change-me
    jwtSecret: change-me-now
    piaUsername: ""
    piaPassword: ""
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

migrations:
  enabled: true
  backoffLimit: 1

scheduler:
  enabled: true
  replicaCount: 1
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

postgres:
  enabled: true
  image:
    repository: postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent
  auth:
    existingSecret: ""
    database: streambridge
    username: postgres
    password: change-me-db-password
    secretKeys:
      database: POSTGRES_DB
      username: POSTGRES_USER
      password: POSTGRES_PASSWORD
  persistence:
    enabled: true
    size: 10Gi
    storageClassName: ""
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

ingress:
  enabled: true
  className: traefik
  annotations: {}
  host: stream.example.com
  tls:
    enabled: false
    secretName: ""

vpn:
  enabled: false
  image:
    repository: qmcgaw/gluetun
    tag: latest
    pullPolicy: IfNotPresent
  serverRegions: "US East"
  rotationHours: "1"
  # Keep the pod's original Kubernetes nameserver instead of replacing it
  # with gluetun's local DNS listener. This preserves in-cluster service
  # discovery while outbound HTTP/HTTPS still goes through the gluetun proxy.
  dnsKeepNameserver: "on"
  # Subnets that bypass the VPN tunnel — must include cluster pod/service CIDRs
  # so internal traffic (postgres, k8s services) is not routed through VPN.
  # k3s defaults: pods=10.42.0.0/16, services=10.43.0.0/16
  firewallOutboundSubnets: "10.42.0.0/16,10.43.0.0/16"
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 320Mi

podAnnotations: {}

nodeSelector: {}

tolerations: []

affinity: {}
