nameOverride: ""
fullnameOverride: ""

imagePullSecrets: []

frontend:
  replicaCount: 1
  image:
    repository: ghcr.io/paradox1612/streambridge-frontend
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 3000
  resources: {}

backend:
  replicaCount: 1
  image:
    repository: ghcr.io/paradox1612/streambridge-backend
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 3001
  env:
    nodeEnv: production
    logLevel: info
    twentyApiUrl: "http://{{ include \"streambridge.fullname\" . }}-twenty:3000"
    stripePublishableKey: ""
    resolverDebug: "false"
    frontendUrl: "https://stream.example.com"
    baseUrl: "https://stream.example.com"
    healthCheckEnabled: "true"
    healthCheckStartupEnabled: "false"
    healthCheckBatchSize: "2"
    healthCheckProviderMinIntervalMs: "3600000"
    accountLookupSuccessTtlSeconds: "600"
    accountLookupFailureTtlSeconds: "300"
    tmdbMatchBatchSize: "1000"
    tmdbMatchConcurrency: "2"
    tmdbMatchBatchPauseMs: "250"
  secrets:
    databaseUrl: ""
    tmdbApiKey: ""
    adminUsername: admin
    adminPassword: change-me
    jwtSecret: change-me-now
    piaUsername: ""
    piaPassword: ""
    stripeSecretKey: ""
    stripeWebhookSecret: ""
    twentyApiKey: ""
    twentyWebhookSecret: ""
    twoCaptchaApiKey: ""
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

migrations:
  enabled: true
  backoffLimit: 1

scheduler:
  enabled: true
  replicaCount: 1
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

postgres:
  enabled: true
  image:
    repository: postgres
    tag: "16-alpine"
    pullPolicy: IfNotPresent
  auth:
    existingSecret: ""
    database: streambridge
    username: postgres
    password: change-me-db-password
    secretKeys:
      database: POSTGRES_DB
      username: POSTGRES_USER
      password: POSTGRES_PASSWORD
  persistence:
    enabled: true
    size: 10Gi
    storageClassName: ""
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

ingress:
  enabled: true
  className: nginx
  annotations: {}
  host: stream.example.com
  tls:
    enabled: false
    secretName: ""

# ── Redis ─────────────────────────────────────────────────────────────────────
# Required by Twenty CRM's BullMQ workers.
# Add the Bitnami redis sub-chart to Chart.yaml:
#   dependencies:
#     - name: redis
#       version: "19.x.x"
#       repository: https://charts.bitnami.com/bitnami
#       condition: redis.enabled
redis:
  enabled: true
  image:
    registry: docker.io
    repository: redis
    tag: "7.2-bookworm"
  auth:
    enabled: false
  master:
    persistence:
      enabled: true
      size: 2Gi
  resources: {}

# ── Twenty CRM ────────────────────────────────────────────────────────────────
twenty:
  enabled: true
  image:
    repository: twentycrm/twenty
    tag: latest
    pullPolicy: IfNotPresent
  replicaCount: 1
  service:
    type: ClusterIP
    port: 3000
  ingress:
    enabled: true
    host: twenty.thekush.dev
    tls: false
    secretName: ""
    annotations: {}
  env:
    SERVER_URL: "https://twenty.thekush.dev"
    REDIS_URL: "redis://{{ .Release.Name }}-redis-master:6379"
    STORAGE_TYPE: local
  secrets:
    # Set existingSecret to the name of a pre-created K8s Secret to skip
    # chart-managed secret creation entirely (recommended for production).
    # The secret must contain: PG_DATABASE_URL, APP_SECRET, ACCESS_TOKEN_SECRET,
    # LOGIN_TOKEN_SECRET, REFRESH_TOKEN_SECRET, FILE_TOKEN_SECRET
    existingSecret: ""
    # Only used when existingSecret is empty. Generate with: openssl rand -base64 32
    appSecret: ""
    accessTokenSecret: ""
    loginTokenSecret: ""
    refreshTokenSecret: ""
    fileTokenSecret: ""
  worker:
    enabled: true
    replicaCount: 1
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}

vpn:
  enabled: false
  image:
    repository: qmcgaw/gluetun
    tag: latest
    pullPolicy: IfNotPresent
  serverRegions: "US East"
  rotationHours: "1"
  # Keep the pod's original Kubernetes nameserver instead of replacing it
  # with gluetun's local DNS listener. This preserves in-cluster service
  # discovery while outbound HTTP/HTTPS still goes through the gluetun proxy.
  dnsKeepNameserver: "on"
  # Subnets that bypass the VPN tunnel — must include cluster pod/service CIDRs
  # so internal traffic (postgres, k8s services) is not routed through VPN.
  # k3s defaults: pods=10.42.0.0/16, services=10.43.0.0/16
  firewallOutboundSubnets: "10.42.0.0/16,10.43.0.0/16"
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 320Mi

podAnnotations: {}

nodeSelector: {}

tolerations: []

affinity: {}
