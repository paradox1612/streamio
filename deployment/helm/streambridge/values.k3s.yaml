frontend:
  replicaCount: 2
  image:
    repository: ghcr.io/paradox1612/streambridge-frontend
    tag: latest

backend:
  replicaCount: 2
  image:
    repository: ghcr.io/paradox1612/streambridge-backend
    tag: latest
  env:
    nodeEnv: production
    logLevel: info
    resolverDebug: "false"
    frontendUrl: "https://stream.example.com"
    baseUrl: "https://stream.example.com"
    healthCheckEnabled: "true"
    healthCheckStartupEnabled: "false"
    tmdbMatchBatchSize: "1000"
    tmdbMatchConcurrency: "2"
    tmdbMatchBatchPauseMs: "250"
  secrets:
    databaseUrl: ""
    tmdbApiKey: "set-me"
    adminUsername: admin
    adminPassword: "set-me"
    jwtSecret: "set-me"
    piaUsername: ""
    piaPassword: ""
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  nodeSelector: {}
  tolerations: []
  affinity: {}

scheduler:
  enabled: true
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
  nodeSelector: {}
  tolerations: []
  affinity: {}

postgres:
  enabled: true
  auth:
    database: streambridge
    username: postgres
    password: "set-me-db-password"
  persistence:
    enabled: true
    size: 20Gi
    storageClassName: local-path
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
  nodeSelector: {}
  tolerations: []
  affinity: {}

vpn:
  # Feature flag — set to true to inject gluetun sidecar into backend & scheduler pods
  enabled: false
  image:
    repository: qmcgaw/gluetun
    tag: latest
    pullPolicy: IfNotPresent
  # PIA server regions (comma-separated); gluetun picks randomly on each reconnect
  serverRegions: "US East"
  # How often the scheduler rotates to a new PIA IP (hours)
  rotationHours: "1"
  # Preserve the pod's original ClusterFirst resolver so service discovery
  # still works while HTTP/HTTPS provider traffic exits via gluetun's proxy.
  dnsKeepNameserver: "on"
  firewallOutboundSubnets: "10.42.0.0/16,10.43.0.0/16"
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 320Mi
  # PIA credentials are read from the backend secret (keys: PIA_USERNAME, PIA_PASSWORD)
  # Add them to backend.secrets or via external secret manager

ingress:
  enabled: true
  className: traefik
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  host: stream.example.com
  tls:
    enabled: true
    secretName: streambridge-tls

twenty:
  ingress:
    enabled: true
    host: twenty.thekush.dev
    tls: true
    secretName: twenty-thekush-dev-tls
  env:
    SERVER_URL: "https://twenty.thekush.dev"
